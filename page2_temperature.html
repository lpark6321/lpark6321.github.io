* { margin:0; padding:0; box-sizing:border-box; }

  align-items: center;

  font-weight: 600;
  letter-spacing: 0.06em;

  background: var(--card);
  color: var(--text2);
  clip-path: polygon(5px 0,100% 0,calc(100% - 5px) 100%,0 100%);
  transition: all .15s;
}
.tab:hover { color: var(--text); }
.tab.active { background:var(--gold); color:#000; border-color:var(--gold); font-weight:700; }

.nav-r {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 14px;
  padding-right: 14px;
}

.dot { width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green);animation:blink 2s infinite; }
@keyframes blink { 0%,100%{opacity:1}50%{opacity:.3} }

  flex: 1;

  grid-template-columns: 200px 1fr;
  grid-template-rows: 1fr 180px;
  gap: 3px;
  padding: 3px;
  overflow: hidden;
}

/* Left column spans all rows */

  grid-row: 1 / 3;

  flex-direction: column;
  gap: 3px;
  overflow: hidden;
}

/* Center top */

  display: flex;
  gap: 3px;
  overflow: hidden;
  min-height: 0;
}

/* Bottom row */

  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 3px;
  overflow: hidden;
}

<script>
// ?? Clock ??
function tick() {
  const d = new Date();
  const t = [d.getHours(),d.getMinutes(),d.getSeconds()].map(x=>String(x).padStart(2,'0')).join(':');
  document.getElementById('clk').textContent = t;
  document.getElementById('big-time').textContent = t;
  document.getElementById('live-time').textContent = t;
}
setInterval(tick, 1000); tick();

// ?? Tab switch ??
document.querySelectorAll('.tab').forEach(t => {
  t.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
    t.classList.add('active');
  });
});

// ?? Helper: draw half-circle gauge ??
function drawGauge(canvasId, value, max, label, bullMode) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const W = 200, H = 100;
  canvas.width = W; canvas.height = H;
  ctx.clearRect(0,0,W,H);

  const cx = W/2, cy = H - 8, r = H - 16;
  const startA = Math.PI, endA = 0;

  // Background arc
  ctx.beginPath();
  ctx.arc(cx, cy, r, Math.PI, 0, false);
  ctx.lineWidth = 14;
  ctx.strokeStyle = '#1a2035';
  ctx.stroke();

  // Color zones
  const zones = bullMode
    ? [ [Math.PI, Math.PI*1.33, '#1a3020'], [Math.PI*1.33, Math.PI*1.66, '#3a4010'], [Math.PI*1.66, Math.PI*2, '#3a1020'] ]
    : [ [Math.PI, Math.PI*1.33, '#1a3020'], [Math.PI*1.33, Math.PI*1.66, '#3a4010'], [Math.PI*1.66, Math.PI*2, '#3a1020'] ];

  zones.forEach(([sa, ea, col]) => {
    ctx.beginPath();
    ctx.arc(cx, cy, r, sa, ea, false);
    ctx.lineWidth = 14;
    ctx.strokeStyle = col;
    ctx.stroke();
  });

  // Value arc
  const ratio = Math.min(value/max, 1);
  const valueA = Math.PI + ratio * Math.PI;
  const arcColor = bullMode
    ? (ratio < 0.35 ? '#1fd67a' : ratio < 0.65 ? '#f5c842' : '#f03a5f')
    : (ratio < 0.35 ? '#1fd67a' : ratio < 0.65 ? '#f5c842' : '#f03a5f');

  ctx.beginPath();
  ctx.arc(cx, cy, r, Math.PI, valueA, false);
  ctx.lineWidth = 14;
  ctx.strokeStyle = arcColor;
  ctx.lineCap = 'round';
  ctx.stroke();

  // Needle
  const needleA = Math.PI + ratio * Math.PI;
  const nx = cx + (r+2) * Math.cos(needleA);
  const ny = cy + (r+2) * Math.sin(needleA);
  ctx.beginPath();
  ctx.moveTo(cx, cy);
  ctx.lineTo(nx, ny);
  ctx.lineWidth = 2.5;
  ctx.strokeStyle = bullMode ? '#f03a5f' : '#1fd67a';
  ctx.lineCap = 'round';
  ctx.stroke();

  // Center dot
  ctx.beginPath();
  ctx.arc(cx, cy, 5, 0, Math.PI*2);
  ctx.fillStyle = bullMode ? '#f03a5f' : '#1fd67a';
  ctx.fill();

  // Scale ticks
  for (let i = 0; i <= 6; i++) {
    const a = Math.PI + (i/6)*Math.PI;
    const x1 = cx + (r-10) * Math.cos(a);
    const y1 = cy + (r-10) * Math.sin(a);
    const x2 = cx + (r-18) * Math.cos(a);
    const y2 = cy + (r-18) * Math.sin(a);
    ctx.beginPath();
    ctx.moveTo(x1,y1);
    ctx.lineTo(x2,y2);
    ctx.lineWidth = 1;
    ctx.strokeStyle = '#2a3550';
    ctx.stroke();
  }

  // Tick labels
  ctx.font = '8px JetBrains Mono';
  ctx.fillStyle = '#4a5a7a';
  ctx.textAlign = 'center';
  const lbls = [0, 25, 50, 75, 100, 125, 150];
  lbls.forEach((lbl, i) => {
    const a = Math.PI + (i/6)*Math.PI;
    const tx = cx + (r-26) * Math.cos(a);
    const ty = cy + (r-26) * Math.sin(a);
    ctx.fillText(lbl, tx, ty+3);
  });

  // Label in arc
  ctx.font = 'bold 10px Noto Sans TC';
  ctx.fillStyle = bullMode ? '#f03a5f' : '#1fd67a';
  ctx.textAlign = 'center';
  ctx.fillText(bullMode ? '憭?餅?' : '蝛箸?餅?', cx, cy - r/2);
}

function drawPie(canvas, up, down, flat, size) {
  const ctx = canvas.getContext('2d');
  canvas.width = size; canvas.height = size;
  const cx = size/2, cy = size/2, r = size/2 - 3;
  const slices = [
    { val: up,   color: '#1fd67a' },
    { val: down, color: '#f03a5f' },
    { val: flat, color: '#2a3550' },
  ];
  let startA = -Math.PI/2;
  const total = up+down+flat;
  slices.forEach(s => {
    const angle = (s.val/total) * Math.PI * 2;
    ctx.beginPath();
    ctx.moveTo(cx,cy);
    ctx.arc(cx,cy,r,startA,startA+angle);
    ctx.closePath();
    ctx.fillStyle = s.color;
    ctx.fill();
    startA += angle;
  });
  // Center hole
  ctx.beginPath();
  ctx.arc(cx,cy,r*0.42,0,Math.PI*2);
  ctx.fillStyle = '#0d1018';
  ctx.fill();
  // Percent text
  ctx.font = `bold ${Math.floor(size*0.18)}px JetBrains Mono`;
  ctx.fillStyle = '#1fd67a';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(up+'%', cx, cy);
}

// Shared: draw bar + candle charts on canvas
function drawBarChart(canvasId, items, type) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  const rect = canvas.parentElement.getBoundingClientRect();
  const W = Math.max(rect.width - 16, 260);
  const H = Math.max(rect.height - 12, 120);
  canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0,0,W,H);

  const leftPad = 42;
  const rightPad = 14;
  const topPad = 10;
  const bottomPad = 24;
  const plotW = W - leftPad - rightPad;
  const plotH = H - topPad - bottomPad;
  const midY = topPad + plotH / 2;

  const maxAbs = Math.max(...items.map(i => Math.abs(i.val)), 0.5);
  const yFor = (v) => midY - (v / maxAbs) * (plotH * 0.45);

  // Horizontal grid + Y axis labels
  const ticks = [maxAbs, maxAbs * 0.5, 0, -maxAbs * 0.5, -maxAbs];
  ctx.font = '12px Noto Sans TC';
  ctx.textAlign = 'right';
  ctx.textBaseline = 'middle';
  ticks.forEach((t) => {
    const y = yFor(t);
    ctx.beginPath();
    ctx.moveTo(leftPad, y);
    ctx.lineTo(W - rightPad, y);
    ctx.strokeStyle = t === 0 ? '#2b3650' : '#1a2236';
    ctx.lineWidth = t === 0 ? 1.2 : 0.8;
    ctx.setLineDash(t === 0 ? [3,3] : []);
    ctx.stroke();
    ctx.setLineDash([]);

    ctx.fillStyle = '#6a7a99';
    ctx.fillText(t.toFixed(2), leftPad - 6, y);
  });

  // Y axis line
  ctx.beginPath();
  ctx.moveTo(leftPad, topPad);
  ctx.lineTo(leftPad, H - bottomPad);
  ctx.strokeStyle = '#2b3650';
  ctx.lineWidth = 1;
  ctx.stroke();

  const n = items.length;
  const gap = 2;
  const barW = Math.max(6, Math.floor((plotW - (n - 1) * gap) / n));

  items.forEach((item, i) => {
    const x = leftPad + i * (barW + gap);
    const barH = Math.abs(item.val / maxAbs) * (plotH * 0.45);
    const isUp = item.val >= 0;
    const color = isUp ? '#f03a5f' : '#1fd67a';
    const y = isUp ? midY - barH : midY;

    ctx.fillStyle = color + (type==='spread' ? 'aa' : 'cc');
    ctx.fillRect(x, y, barW, barH);

    ctx.font = '11px Noto Sans TC';
    ctx.fillStyle = '#6a7a99';
    ctx.textAlign = 'center';
    const label = item.label.length > 3 ? item.label.slice(0,2) : item.label;
    ctx.fillText(label, x + barW/2, H - 8);
  });
}

// ?? Flow canvas (mini trend) ??
function drawFlowLine() {
  const canvas = document.getElementById('flow-canvas');
  if (!canvas) return;
  const pw = canvas.parentElement.getBoundingClientRect().width;
  const W = Math.max(pw - 16, 100);
  const H = 50;
  canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext('2d');
  // Generate mock data
  const pts = Array.from({length:20},(_,i)=>({
    x: i/(19)*(W-4)+2,
    y: H/2 + Math.sin(i*0.6)*12 + (Math.random()-0.5)*6
  }));
  ctx.beginPath();
  pts.forEach((p,i)=>i===0?ctx.moveTo(p.x,p.y):ctx.lineTo(p.x,p.y));
  ctx.strokeStyle = '#3d84ff';
  ctx.lineWidth = 1.2;
  ctx.stroke();
  // Fill
  ctx.lineTo(pts[pts.length-1].x, H);
  ctx.lineTo(pts[0].x, H);
  ctx.closePath();
  ctx.fillStyle = 'rgba(61,132,255,0.08)';
  ctx.fill();
  // Zero
  ctx.beginPath();
  ctx.moveTo(0,H/2); ctx.lineTo(W,H/2);
  ctx.strokeStyle = '#1c2236';
  ctx.lineWidth = 0.5;
  ctx.setLineDash([2,3]);
  ctx.stroke();
}
