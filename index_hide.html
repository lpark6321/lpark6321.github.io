<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Taiwan Stock Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style/variables.css">
  <link rel="stylesheet" href="./style/layout.css">
  <link rel="stylesheet" href="./style/components.css">
  <link rel="stylesheet" href="./pages/page1/page1.css">
  <link rel="stylesheet" href="./pages/page2/page2.css">
  <link rel="stylesheet" href="./pages/page3/page3.css">
  <link rel="stylesheet" href="./pages/page4/page4.css">
  <link rel="stylesheet" href="./pages/page5/page5.css">
  <link rel="stylesheet" href="./pages/page6/page6.css">
  <link rel="stylesheet" href="./pages/page7/page7.css">
</head>
<body>
  <div class="shell">
    <header class="shell__header">
      <div class="shell__brand">
        <h1 class="shell__title">Taiwan Stock Dashboard</h1>
        <p class="shell__subtitle">Pure HTML + CSS + ES Modules</p>
      </div>
      <div class="shell__actions">
        <a class="shell__link" href="./index.html">Data Lab</a>
        <nav class="tabbar" aria-label="Pages">
          <button class="tabbar__tab" type="button" data-page="page1">PAGE 1 Futures Overview</button>
          <button class="tabbar__tab" type="button" data-page="page2">PAGE 2 Market Temperature</button>
          <button class="tabbar__tab" type="button" data-page="page3">PAGE 3 Watchlist Alerts</button>
          <button class="tabbar__tab" type="button" data-page="page4">PAGE 4 Options Strategy</button>
          <button class="tabbar__tab" type="button" data-page="page5">PAGE 5 Stock Screener</button>
          <button class="tabbar__tab" type="button" data-page="page6">PAGE 6 Market Map</button>
          <button class="tabbar__tab" type="button" data-page="page7">PAGE 7 Global Indices</button>
        </nav>
      </div>
    </header>
    <main id="app" class="shell__main" aria-live="polite"></main>
  </div>

  <script type="module">
    import { startPriceSimulator } from './services/priceSimulator.js';

    const app = document.getElementById('app');
    const tabs = [...document.querySelectorAll('.tabbar__tab')];

    const pageModules = {
      page1: () => import('./pages/page1/page1.js'),
      page2: () => import('./pages/page2/page2.js'),
      page3: () => import('./pages/page3/page3.js'),
      page4: () => import('./pages/page4/page4.js'),
      page5: () => import('./pages/page5/page5.js'),
      page6: () => import('./pages/page6/page6.js'),
      page7: () => import('./pages/page7/page7.js')
    };

    startPriceSimulator();

    const loaded = new Map();
    let activePage = null;
    let activeUnmount = null;

    function setActiveTab(page) {
      tabs.forEach((tab) => {
        const isActive = tab.dataset.page === page;
        tab.classList.toggle('is-active', isActive);
        tab.setAttribute('aria-selected', String(isActive));
      });
    }

    function normalize(hash) {
      const key = (hash || '').replace('#', '');
      return key in pageModules ? key : 'page1';
    }

    async function loadPage(page) {
      if (!loaded.has(page)) {
        loaded.set(page, await pageModules[page]());
      }
      return loaded.get(page);
    }

    async function navigate(page, { pushHash = true } = {}) {
      if (page === activePage) return;

      if (typeof activeUnmount === 'function') {
        activeUnmount();
        activeUnmount = null;
      }

      app.innerHTML = '';
      activePage = page;
      setActiveTab(page);

      try {
        const mod = await loadPage(page);
        if (typeof mod.mount !== 'function') {
          throw new Error(`${page} is missing mount()`);
        }
        if (pushHash && location.hash !== `#${page}`) {
          location.hash = `#${page}`;
        }
        activeUnmount = mod.mount(app) || null;
      } catch (err) {
        console.error(err);
        app.innerHTML = `<section class="panel"><div class="panel__body">Failed to load ${page}</div></section>`;
      }
    }

    tabs.forEach((tab) => {
      tab.addEventListener('click', () => navigate(tab.dataset.page));
    });

    window.addEventListener('hashchange', () => {
      navigate(normalize(location.hash), { pushHash: false });
    });

    const initial = normalize(location.hash);
    if (location.hash !== `#${initial}`) {
      history.replaceState(null, '', `#${initial}`);
    }
    navigate(initial, { pushHash: false });
  </script>
</body>
</html>
